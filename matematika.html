  padding:

   PAGE 1 BELANG ANIMASI
========================= */

  background:
    repeating-linear-gradient(
      45deg,
      #084ae4 0px,

      #1e293b 40px,
      #3c3e3d 80px
    );

  animation:stripeMove 6s linear infinite;
}

/* EFEK CAHAYA */
#page1::before{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      120deg,

  animation:lightMove 5s linear infinite;

========================= */

#page2{
  

  background:

      -45deg,
      #60b8e1 0px,
      #0ea5e9 35px,
      #0284c7 35px,
      #89c9e9 70px
    );

  animation:page2Stripe 5s linear infinite;
}

/* LAPISAN GLOW */
#page2::before{
  content:"";

  position:absolute;
  inset:0%;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,.12),
      transparent 60%
    );

  animation:page2Glow 8s linear infinite;
}
/* =========================
   WARNA HASIL JAWABAN
========================= */

/* BENAR */
.option.correct{
  background:#00d26a !important;
  color:rgb(255, 255, 255) !important;

  transform:scale(1.05);

  box-shadow:
    0 0 20px rgba(0,210,106,.6);
}

/* SALAH */
.option.wrong{
  background:#ff3b3b !important;
  color:white !important;

  opacity:.95;
}

/* MATIKAN HOVER SAAT SUDAH DIPILIH */
.option.correct:hover,
.option.wrong:hover{
  transform:none;
}
/* =========================
   PAGE 2 FUTURISTIC 3D
========================= */

#page2{


  background:
    linear-gradient(
      135deg,
      #020617,
      #0f172a,
      #111827,
      #1e293b
    );

  background-size:400% 400%;

  animation:bgMove3D 18s ease infinite;
}

/* LAYER BELAKANG */
#page2::before{
  content:"";

  position:absolute;
  inset:-20%;

  background:
    repeating-linear-gradient(
      60deg,
      rgba(0,255,255,.07) 0px,
      rgba(0,255,255,.07) 2px,
      transparent 2px,
      transparent 80px
    );

  transform:
    perspective(1000px)
    rotateX(75deg)
    scale(2);

  animation:gridMove 10s linear infinite;

  opacity:.9;
}

/* GLOW BESAR */
#page2::after{
  content:"";

  position:absolute;
  width:700px;
  height:700px;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(0,255,255,.18),
      transparent 70%
    );

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  animation:pulseGlow 6s ease-in-out infinite;
}

/* KONTEN DI DEPAN */
#page2 *{
  position:relative;
  z-index:2;
}

   ANIMASI
========================= */

/* BACKGROUND */
@keyframes bgMove3D{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

/* GRID BERGERAK */
@keyframes gridMove{

  from{
    transform:
      perspective(1000px)
      rotateX(75deg)
      translateY(0)
      scale(2);
  }

  to{
    transform:
      perspective(1000px)
      rotateX(75deg)
      translateY(80px)
      scale(2);
  }
}

/* GLOW HIDUP */
@keyframes pulseGlow{

  0%{
    transform:
      translate(-50%,-50%)
      scale(1);

    opacity:.5;
  }

  50%{
    transform:
      translate(-50%,-50%)
      scale(1.2);

    opacity:.9;
  }

  100%{
    transform:
      translate(-50%,-50%)
      scale(1);

    opacity:.5;
  }
}

   FIX TIDAK BISA GESER KANAN
========================= */

body{
  overflow-x:hidden !important;
  width:100%;
  max-width:100%;
}

  box-sizing:border-box;
}

.container,

#page2 .info{
  background:rgba(255,255,255,.08);

  border:
    1px solid rgba(255,255,255,.15);

  border-radius:14px;

  padding:12px 16px;

  backdrop-filter:blur(8px);
}
/* =========================
   WARNING TIMER
========================= */

#warningText{
  position:absolute;
  top:20px;

  left:50%;
  transform:translateX(-50%);

  padding:14px 28px;

  border-radius:20px;

  font-size:24px;
  font-weight:900;
  letter-spacing:2px;

  color:white;

  background:
    linear-gradient(
      135deg,
      #ff0000,
      #ff6600
    );

  box-shadow:
    0 0 20px rgba(255,0,0,.7),
    0 0 50px rgba(255,80,0,.5);

  text-shadow:
    0 0 10px white,
    0 0 20px yellow;

  z-index:999;

  opacity:0;

  animation:none;

  transition:.3s;
}

/* MUNCUL */
#warningText.show{
  opacity:1;

  animation:
    warningShake .4s infinite,
    warningGlow 1s infinite alternate;
}

/* GOYANG */
@keyframes warningShake{

  0%{
    transform:
      translateX(-50%)
      translateX(0);
  }

  25%{
    transform:
      translateX(-50%)
      translateX(-5px);
  }

  50%{
    transform:
      translateX(-50%)
      translateX(5px);
  }

  75%{
    transform:
      translateX(-50%)
      translateX(-5px);
  }

  100%{
    transform:
      translateX(-50%)
      translateX(0);
  }
}

/* GLOW */
@keyframes warningGlow{

  from{
    box-shadow:
      0 0 15px red,
      0 0 30px orange;
  }

  to{
    box-shadow:
      0 0 30px red,
      0 0 60px yellow;
  }
}
#warningText{
  animation:
    warningShake .4s infinite,
    warningGlow 1s infinite alternate,
    zoomWarn .6s infinite alternate;
}

/* ZOOM */
@keyframes zoomWarn{

  from{
    transform:translateX(-50%) scale(1);
  }

  to{
    transform:translateX(-50%) scale(1.08);
  }

}
/* =========================
   PAGE 3 CYBER GALAXY 3D
========================= */

#page3{
  

  background:
    radial-gradient(circle at center,#4f46e522 0%,transparent 35%),

}

/* BINTANG */

  content:"";

  inset:0;

  opacity:.7;

/* PLANET */
#page3::after{
  content:"";

  position:absolute;

  width:320px;
  height:320px;

  border-radius:50%;

  background:

  font-weight:bold;

}

}

  transform:

}

/* =========================
   ANIMASI
========================= */

@keyframes starsMove{
  from{
    transform:translateY(0);
  }

    transform:translateY(200px);
  }
}

@keyframes planetFloat{

  0%{
    transform:

  }

  }

@keyframes spaceMove{

 lives=3;
 questionCount=0;

 livesEl.innerText=lives;

}

else if(school==="SMK") timeLeft=45;

if(!answers.includes(wrong)) answers.push(wrong);
}

answers.forEach(ans=>{
let btn=document.createElement("button");

let all=document.querySelectorAll(".option");

document.body.classList.add("flash");
setTimeout(()=>document.body.classList.remove("flash"),300);

/* efek tombol dipilih */
btn.classList.add("selected");

/* disable semua */
all.forEach(b=>b.disabled=true);

/* kasih warna dengan animasi */
all.forEach(b=>{

  let value = Number(b.innerText);

  /* JAWABAN BENAR */
  if(value === correctAnswer){

    b.classList.remove("wrong");
    b.classList.add("correct");

  }

  /* JAWABAN SALAH */
  else{

    b.classList.remove("correct");
    b.classList.add("wrong");

  }

});

/* animasi fade sebelum soal baru */
setTimeout(()=>{
question.classList.add("fade-out");
options.classList.add("fade-out");
},300);

setTimeout(()=>{
checkAnswer(ans);

/* balik normal */
question.classList.remove("fade-out");
options.classList.remove("fade-out");

question.classList.add("fade-in");
options.classList.add("fade-in");

setTimeout(()=>{
question.classList.remove("fade-in");
options.classList.remove("fade-in");
},300);

},700);
};

options.appendChild(btn);
});
}

function checkAnswer(ans){
if(ans===correctAnswer){
score+=10;
scoreEl.innerText=score;
}else{
lives--;
livesEl.innerText=lives;

if(lives<=0){
endGame();
return;
}
}
generateQuestion();

}

function startTimer(){

  timer.innerText = timeLeft;

  timerInterval = setInterval(()=>{

    timeLeft--;

    timer.innerText = timeLeft;

    // 🔥 WARNING MUNCUL
    if(timeLeft <= 10){

      warningText.classList.add("show");

      // teks berubah sesuai waktu
      warningText.innerText =
      "⚠ " + timeLeft + " DTK ⚠";

    }else{

      warningText.classList.remove("show");

    }

    // ⏰ WAKTU HABIS
    if(timeLeft <= 0){

      clearInterval(timerInterval);

      warningText.classList.remove("show");

      lives--;

      livesEl.innerText = lives;

      if(lives <= 0){

        endGame();

      }else{

        generateQuestion();

      }

    }

  },1000);

}



function exitApp(){
  document.getElementById("exitModal").style.display = "flex";
}

function closeExit(){
  document.getElementById("exitModal").style.display = "none";
}



function confirmExit(){

  // APK Android Studio
  if(window.Android && Android.exitApp){

    Android.exitApp();

  }

  // Browser biasa
  else{

    window.close();

  }

}



</script>

      font-size:15px;

    ">
      🚪 Kamu yakin ingin keluar dari game?
    </h3>

    <!-- tombol horizontal -->
    <div style="
      display:flex;
      justify-content:space-between;
      gap:10px;
    ">

      <button onclick="confirmExit()" style="
        flex:1;
        background:#e74a3b;

      ">Ya</button><br><br>
